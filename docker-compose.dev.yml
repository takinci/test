services:
  api:
    build:
      context: .
      target: app
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
    env_file:
      - .env.example
  web:
    image: node:20-alpine
    working_dir: /web
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/web
    environment:
      - VITE_API_URL=http://localhost:8000
